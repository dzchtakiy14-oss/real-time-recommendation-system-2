groups:
  - name: fastapi_alerts
    rules:

      # 🚨 Latency عالي
      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(request_latency_seconds_bucket[1m])) by (le)) > 0.5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "P95 latency is above 0.5 seconds"

      # 🚨 Errors
      - alert: HighErrorRate
        expr: sum(rate(error_count_total[1m])) > 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High error rate"
          description: "Too many errors in the system"

      # 🚨 API Down
      - alert: APIDown
        expr: up{job="fastapi"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "API is down"